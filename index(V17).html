<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY DASHBOARD</title>
<style>
/* ══════════════════════════════════════
   CSS 變數
══════════════════════════════════════ */
:root {
  --bg:     #f4f6fa;
  --bg2:    #ffffff;
  --bg3:    #f0f2f7;
  --text:   #1a1d24;
  --text2:  #464e62;
  --text3:  #8a909c;
  --border: #e0e4ec;
  --up:     #d42b2b;
  --down:   #1a9e5c;
  --flat:   #8a909c;
  --accent: #1a5fd4;
  --purple: #6d3cc9;
  --mono:   'IBM Plex Mono', 'Courier New', monospace;
  --radius: 12px;
  --shadow: 0 2px 8px rgba(0,0,0,.06);
}

/* ══════════════════════════════════════
   基礎 Reset
══════════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, 'PingFang TC', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
button { border: none; background: none; cursor: pointer; font-family: inherit; }

/* ══════════════════════════════════════
   登入牆
══════════════════════════════════════ */
#loginWall {
  position: fixed; inset: 0; background: var(--bg2);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 24px; z-index: 1000; padding: 32px;
}
.login-logo { font-family: var(--mono); font-size: 26px; font-weight: 700; color: var(--accent); letter-spacing: 2px; }
.login-sub  { font-size: 14px; color: var(--text3); }
.login-btn  {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 28px; background: var(--bg2);
  border: 1.5px solid var(--border); border-radius: 12px;
  font-size: 15px; font-weight: 500; color: var(--text);
  box-shadow: var(--shadow); width: 100%; max-width: 300px; justify-content: center;
}
.login-hint { font-size: 12px; color: var(--text3); text-align: center; line-height: 1.6; }

/* ══════════════════════════════════════
   主體（預設隱藏，登入後顯示）
══════════════════════════════════════ */
#app { display: none; flex-direction: column; min-height: 100vh; }
body.logged-in #app { display: flex; }
body.logged-in #loginWall { display: none; }

/* ══════════════════════════════════════
   頂部 Header
══════════════════════════════════════ */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 0 16px; height: 52px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-left  { display: flex; align-items: center; gap: 8px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.logo { font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--accent); }
.market-badge {
  font-size: 11px; font-family: var(--mono); font-weight: 600;
  padding: 3px 8px; border-radius: 20px;
  background: rgba(26,158,92,.1); color: var(--down);
}
.market-badge.closed { background: rgba(138,144,156,.1); color: var(--text3); }
.clock { font-family: var(--mono); font-size: 12px; color: var(--text3); }
.avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--accent); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
}
.logout-btn { font-size: 12px; color: var(--text3); padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; }

/* ══════════════════════════════════════
   指數跑馬燈
══════════════════════════════════════ */
.ticker-bar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  overflow-x: auto; white-space: nowrap; scrollbar-width: none;
  padding: 0 4px;
}
.ticker-bar::-webkit-scrollbar { display: none; }
.tk-item {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 12px; border-right: 1px solid var(--border);
  font-size: 12px;
}
.tk-night { background: rgba(109,60,201,.05); }
.tk-tag { font-size: 9px; font-family: var(--mono); font-weight: 700; padding: 1px 5px; border-radius: 3px; background: rgba(109,60,201,.15); color: var(--purple); }
.tk-label { color: var(--text3); font-size: 11px; }
.tk-price { font-family: var(--mono); font-weight: 600; font-size: 13px; }
.tk-chg   { font-family: var(--mono); font-size: 11px; }
.up   { color: var(--up); }
.down { color: var(--down); }
.flat { color: var(--flat); }

/* ══════════════════════════════════════
   底部導覽（手機）
══════════════════════════════════════ */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg2); border-top: 1px solid var(--border);
  display: flex; padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  z-index: 100;
}
.bn-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; padding: 4px 0; font-size: 10px; color: var(--text3);
}
.bn-item.active { color: var(--accent); }
.bn-icon { font-size: 20px; line-height: 1; }

/* ══════════════════════════════════════
   頁面內容區
══════════════════════════════════════ */
.page { display: none; flex: 1; overflow-y: auto; padding-bottom: 72px; }
.page.active { display: block; }

/* ══════════════════════════════════════
   自選股頁面
══════════════════════════════════════ */
.watch-search {
  margin: 12px 16px 8px;
  display: flex; align-items: center; gap: 8px;
  background: var(--bg3); border-radius: 10px; padding: 10px 14px;
}
.watch-search input {
  flex: 1; background: none; border: none; outline: none;
  font-size: 14px; color: var(--text);
}
.group-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 6px;
}
.group-label { font-size: 12px; font-weight: 600; color: var(--text3); letter-spacing: .5px; }
.srow {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; background: var(--bg2);
  border-bottom: 1px solid var(--border); cursor: pointer;
  transition: background .1s;
}
.srow:active { background: var(--bg3); }
.srow.selected { border-left: 3px solid var(--accent); }
.s-info  { flex: 1; min-width: 0; }
.s-code  { font-family: var(--mono); font-size: 15px; font-weight: 600; }
.s-name  { font-size: 12px; color: var(--text3); margin-top: 2px; }
.s-sigs  { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 3px; }
.sig     { font-size: 10px; font-family: var(--mono); font-weight: 700; padding: 1px 5px; border-radius: 3px; }
.fi-buy  { background: rgba(212,43,43,.1);  color: var(--up); }
.fi-sell { background: rgba(26,158,92,.1);  color: var(--down); }
.ti-buy  { background: rgba(212,43,43,.08); color: var(--up); }
.ti-sell { background: rgba(26,158,92,.08); color: var(--down); }
.both    { background: rgba(26,95,212,.1);  color: var(--accent); }
.exdiv   { background: rgba(255,160,0,.1);  color: #c87000; }
.holder  { background: rgba(109,60,201,.1); color: var(--purple); }
.s-spark { width: 60px; height: 32px; }
.s-nums  { text-align: right; }
.s-price { font-family: var(--mono); font-size: 16px; font-weight: 600; }
.s-pct   { font-family: var(--mono); font-size: 12px; margin-top: 2px;
           padding: 1px 6px; border-radius: 4px; }
.pct-bg-up   { background: rgba(212,43,43,.1); }
.pct-bg-down { background: rgba(26,158,92,.1); }
.pct-bg-flat { background: var(--bg3); }

/* ══════════════════════════════════════
   個股詳情頁
══════════════════════════════════════ */
.detail-header {
  background: var(--bg2); padding: 16px;
  border-bottom: 1px solid var(--border);
}
.detail-back {
  display: flex; align-items: center; gap: 6px;
  font-size: 14px; color: var(--accent); margin-bottom: 12px;
}
.detail-code  { font-family: var(--mono); font-size: 20px; font-weight: 700; }
.detail-name  { font-size: 14px; color: var(--text3); margin-top: 2px; }
.detail-price { font-family: var(--mono); font-size: 36px; font-weight: 700; margin: 8px 0 4px; }
.detail-chg   { font-family: var(--mono); font-size: 15px; }
.stats-row    { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--border); margin-top: 1px; }
.stat-cell    { background: var(--bg2); padding: 10px 12px; text-align: center; }
.stat-lbl     { font-size: 11px; color: var(--text3); }
.stat-val     { font-family: var(--mono); font-size: 13px; font-weight: 500; margin-top: 3px; }

/* 頁籤 */
.tab-bar {
  display: flex; background: var(--bg2);
  border-bottom: 1px solid var(--border);
  overflow-x: auto; scrollbar-width: none;
  position: sticky; top: 52px; z-index: 10;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0; padding: 12px 16px;
  font-size: 13px; color: var(--text3);
  border-bottom: 2px solid transparent;
  white-space: nowrap;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.tab-pane { display: none; padding: 16px; }
.tab-pane.active { display: block; }

/* 卡片 */
.card {
  background: var(--bg2); border-radius: var(--radius);
  margin-bottom: 12px; overflow: hidden;
  box-shadow: var(--shadow);
}
.card-title { font-size: 13px; font-weight: 600; padding: 14px 16px 10px; border-bottom: 1px solid var(--border); }

/* ══════════════════════════════════════
   新聞頁面
══════════════════════════════════════ */
.news-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg2); }
.news-tab  { flex: 1; padding: 12px; text-align: center; font-size: 13px; color: var(--text3); border-bottom: 2px solid transparent; }
.news-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.nitem { padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--bg2); cursor: pointer; }
.nitem:active { background: var(--bg3); }
.n-meta { display: flex; justify-content: space-between; margin-bottom: 6px; }
.n-src  { font-size: 11px; font-weight: 600; color: var(--accent); }
.n-time { font-size: 11px; color: var(--text3); }
.n-title { font-size: 14px; line-height: 1.5; }

/* ══════════════════════════════════════
   平板版（768px+）：兩欄
══════════════════════════════════════ */
@media (min-width: 768px) {
  .bottom-nav { display: none; }
  .page { display: block !important; padding-bottom: 0; }
  #app { flex-direction: column; }
  .main-layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 0; flex: 1;
  }
  .left-col {
    border-right: 1px solid var(--border);
    overflow-y: auto; height: calc(100vh - 104px);
    position: sticky; top: 52px;
  }
  .right-col { overflow-y: auto; }
  .page-news { display: block !important; }
}

/* ══════════════════════════════════════
   電腦版（1100px+）：三欄
══════════════════════════════════════ */
@media (min-width: 1100px) {
  .main-layout { grid-template-columns: 280px 1fr 320px; }
  .right-panel {
    border-left: 1px solid var(--border);
    overflow-y: auto; height: calc(100vh - 104px);
    position: sticky; top: 52px;
  }
}
</style>
</head>
<body>

<!-- ═══ 登入牆 ═══ -->
<div id="loginWall">
  <div class="login-logo">MY DASHBOARD</div>
  <div class="login-sub">你的個人股票看板</div>
  <button class="login-btn" onclick="googleLogin()">
    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    使用 Google 帳號登入
  </button>
  <div class="login-hint">登入後自選股設定自動同步<br>到你的所有裝置</div>
</div>

<!-- ═══ 主體 ═══ -->
<div id="app">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="logo">MY DASHBOARD</span>
      <span class="market-badge" id="mktBadge">台股開盤中</span>
    </div>
    <div class="header-right">
      <span class="clock" id="clock">--:--:--</span>
      <div class="avatar" id="userAvatar">YL</div>
      <button class="logout-btn" onclick="googleLogout()">登出</button>
    </div>
  </header>

  <!-- 指數跑馬燈 -->
  <div class="ticker-bar" id="tickerBar"></div>

  <!-- 主要佈局 -->
  <div class="main-layout">

    <!-- 左欄：自選股（手機是第一頁） -->
    <div class="left-col">
      <div class="page active" id="pageWatch">
        <div class="watch-search">
          <svg width="16" height="16" fill="none" stroke="#8a909c" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="搜尋代號或名稱…" id="searchInput">
        </div>
        <div id="watchList"></div>
      </div>
    </div>

    <!-- 中欄：個股詳情（手機是第二頁） -->
    <div class="right-col">
      <div class="page" id="pageChart">
        <!-- 個股 Header -->
        <div class="detail-header">
          <div class="detail-back" onclick="showPage('pageWatch')">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
            自選股
          </div>
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <div class="detail-code" id="dCode">2330</div>
              <div class="detail-name" id="dName">台積電</div>
            </div>
            <div style="text-align:right">
              <div class="detail-price up" id="dPrice">980</div>
              <div class="detail-chg up" id="dChg">+12 (+1.24%)</div>
            </div>
          </div>
        </div>
        <!-- OHLC -->
        <div class="stats-row">
          <div class="stat-cell"><div class="stat-lbl">開盤</div><div class="stat-val" id="dOpen">--</div></div>
          <div class="stat-cell"><div class="stat-lbl">最高</div><div class="stat-val up" id="dHigh">--</div></div>
          <div class="stat-cell"><div class="stat-lbl">最低</div><div class="stat-val down" id="dLow">--</div></div>
          <div class="stat-cell"><div class="stat-lbl">成交量</div><div class="stat-val" id="dVol">--</div></div>
        </div>
        <!-- K線佔位 -->
        <div style="background:var(--bg2);margin:12px 16px;border-radius:var(--radius);padding:40px 20px;text-align:center;color:var(--text3);font-size:13px;border:1px dashed var(--border)">
          <div style="font-size:32px;margin-bottom:8px">📈</div>
          K 線圖 — 第二階段接入 TradingView
        </div>
        <!-- 頁籤 -->
        <div class="tab-bar">
          <button class="tab-btn active" onclick="switchTab('chip',this)">籌碼面</button>
          <button class="tab-btn" onclick="switchTab('fin',this)">財務面</button>
          <button class="tab-btn" onclick="switchTab('basic',this)">基本資料</button>
          <button class="tab-btn" onclick="switchTab('tech',this)">技術面</button>
        </div>
        <div id="tabChip" class="tab-pane active"></div>
        <div id="tabFin"  class="tab-pane"></div>
        <div id="tabBasic" class="tab-pane"></div>
        <div id="tabTech"  class="tab-pane"></div>
      </div>

      <!-- 新聞頁（手機第三頁） -->
      <div class="page" id="pageNews">
        <div class="news-tabs">
          <div class="news-tab active" onclick="switchNews('tw',this)">國內</div>
          <div class="news-tab" onclick="switchNews('intl',this)">國際</div>
        </div>
        <div id="newsTw"></div>
        <div id="newsIntl" style="display:none"></div>
      </div>

      <!-- 更多頁（手機第四頁） -->
      <div class="page" id="pageMore">
        <div style="padding:16px">
          <!-- 券商評等 -->
          <div class="card">
            <div class="card-title">券商評等 <span style="font-size:11px;color:var(--text3);font-weight:400" id="analystStock">2330</span></div>
            <div style="padding:14px 16px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                <div>
                  <div style="font-size:11px;color:var(--text3);margin-bottom:4px">目標價區間</div>
                  <div style="font-family:var(--mono);font-size:16px;font-weight:600" id="analystTarget">NT$1,050 ~ 1,280</div>
                </div>
                <div style="background:rgba(212,43,43,.08);padding:8px 14px;border-radius:8px;text-align:center">
                  <div style="font-size:10px;color:var(--text3)">共識</div>
                  <div style="font-family:var(--mono);font-size:14px;font-weight:700;color:var(--up)" id="analystConsensus">強力買進</div>
                </div>
              </div>
              <div id="analystBar" style="height:8px;border-radius:4px;overflow:hidden;display:flex;gap:2px;margin-bottom:6px"></div>
              <div id="analystLegend" style="display:flex;gap:12px;font-size:10px;font-family:var(--mono)"></div>
            </div>
            <div id="analystReports" style="border-top:1px solid var(--border)"></div>
          </div>
          <!-- 公觀站 -->
          <div class="card">
            <div class="card-title">公開資訊觀測站</div>
            <div id="mopsContent"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 右側面板（電腦三欄才顯示） -->
    <div class="right-panel" style="display:none" id="rightPanel">
      <div style="padding:16px">
        <div class="card">
          <div class="card-title">券商評等</div>
          <div style="padding:14px 16px">
            <div style="font-size:13px;color:var(--text3)">同左側更多頁</div>
          </div>
        </div>
        <div class="card">
          <div class="card-title">即時新聞</div>
          <div id="newsDesktop"></div>
        </div>
      </div>
    </div>

  </div><!-- end main-layout -->

  <!-- 底部導覽 -->
  <nav class="bottom-nav" id="bottomNav">
    <button class="bn-item active" onclick="showPage('pageWatch',this)">
      <span class="bn-icon">⭐</span>自選股
    </button>
    <button class="bn-item" onclick="showPage('pageChart',this)">
      <span class="bn-icon">📊</span>圖表
    </button>
    <button class="bn-item" onclick="showPage('pageNews',this)">
      <span class="bn-icon">📰</span>新聞
    </button>
    <button class="bn-item" onclick="showPage('pageMore',this)">
      <span class="bn-icon">⋯</span>更多
    </button>
  </nav>

</div><!-- end app -->

const cls = p => p > 0 ? 'up' : p < 0 ? 'down' : 'flat';
const sgn = p => p > 0 ? '+' : '';

function spark(data, pct) {
  const w=60, h=32, pad=2;
  const vals = data.filter(v => v != null);
  if (!vals.length) return '<svg width="60" height="32"></svg>';
  const mn = Math.min(...vals), mx = Math.max(...vals);
  const range = mx - mn || 1;
  const pts = vals.map((v,i) => {
    const x = pad + i/(vals.length-1)*(w-pad*2);
    const y = h - pad - (v-mn)/range*(h-pad*2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const color = pct >= 0 ? 'var(--up)' : 'var(--down)';
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function buildSigs(s) {
  const p = [];
  if (s.fi > 0) p.push(`<span class="sig fi-buy">外+${s.fi}</span>`);
  else if (s.fi < 0) p.push(`<span class="sig fi-sell">外${s.fi}</span>`);
  if (s.ti > 0) p.push(`<span class="sig ti-buy">投+${s.ti}</span>`);
  else if (s.ti < 0) p.push(`<span class="sig ti-sell">投${s.ti}</span>`);
  if (s.exdiv != null) p.push(`<span class="sig exdiv">息${s.exdiv}</span>`);
  if (s.holderAlert) p.push(`<span class="sig holder">大</span>`);
  return p.join('');
}

function updateClock() {
  const now = new Date();
  const t = now.toLocaleTimeString('zh-TW', {hour12:false});
  document.getElementById('clock').textContent = t;
  // 市場狀態
  const h = now.getHours(), m = now.getMinutes();
  const mins = h*60+m;
  const badge = document.getElementById('mktBadge');
  const isWeekday = now.getDay() >= 1 && now.getDay() <= 5;
  if (isWeekday && mins >= 9*60 && mins < 13*60+30) {
    badge.textContent = '台股開盤中'; badge.className = 'market-badge';
  } else if (isWeekday && mins >= 15*60) {
    badge.textContent = '台指夜盤'; badge.className = 'market-badge';
  } else {
    badge.textContent = '台股休市'; badge.className = 'market-badge closed';
  }
}

  let html = '';
  GROUPS.forEach(g => {

    });
    if (!codes.length) return;
    html += `<div class="group-header"><span class="group-label">${g.label}</span></div>`;
    codes.forEach(code => {

const API = 'https://stock-dashboard-backend-qtdi.onrender.com';

async function fetchAndUpdate() {
  try {
    const [si, ss, sn] = await Promise.all([
      fetch(API+'/api/indices').then(r=>r.json()),
      fetch(API+'/api/stocks').then(r=>r.json()),
      fetch(API+'/api/news').then(r=>r.json()),
    ]);
    // 更新指數
    if (si.data) renderTicker(si.data);
    // 更新股票
    if (ss.data) {
      Object.entries(ss.data).forEach(([code,d]) => {
        if (S[code]) Object.assign(S[code], {price:d.price,chg:d.chg,pct:d.pct,open:d.open,high:d.high,low:d.low,vol:Math.round(d.vol/1000)+'張'});
      });
      renderWatch(document.getElementById('searchInput').value);
      if (activeCode) selectStock(activeCode);
    }
    // 更新新聞
    if (sn.tw && sn.tw.length)   renderNews(sn.tw,   'newsTw');
    if (sn.intl && sn.intl.length) renderNews(sn.intl,'newsIntl');
    console.log('[API] updated');
  } catch(e) { console.log('[API] error:', e); }
}

  if (w >= 1100) {
    if (rp) rp.style.display = '';
    document.querySelectorAll('.page').forEach(p => p.style.removeProperty('display'));
  } else if (w >= 768) {
    if (rp) rp.style.display = 'none';
    document.querySelectorAll('.page').forEach(p => p.style.removeProperty('display'));
  } else {
    if (rp) rp.style.display = 'none';
    document.querySelectorAll('.page').forEach(p => {
      p.style.display = p.classList.contains('active') ? 'block' : 'none';
    });
  }
}
window.addEventListener('resize', checkLayout);
</script>

window.googleLogin = async () => {

    await signInWithPopup(auth, provider);
  } catch(e) {
    if (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user') {
      signInWithRedirect(auth, provider);

};

window.googleLogout = () => {

};

onAuthStateChanged(auth, async user => {
  if (user) {
    sessionStorage.setItem('dash_logged_in', '1');
    document.body.classList.add('logged-in');
    // 更新 header
    const av = document.getElementById('userAvatar');
    if (av) {
      if (user.photoURL) {
        av.innerHTML = `<img src="${user.photoURL}" width="30" height="30" style="border-radius:50%">`;
      } else {
        av.textContent = user.displayName?.charAt(0) || 'U';
      }
    }
    // 初始化
    if (!window._appInited) {
      window._appInited = true;
      initApp();
      checkLayout();
      // 抓真實資料
      fetchAndUpdate();
      setInterval(fetchAndUpdate, 5 * 60 * 1000);
    }
  } else {
    sessionStorage.removeItem('dash_logged_in');
    document.body.classList.remove('logged-in');
    window._appInited = false;
  }
});
</script>
